{% extends 'base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="h4 mb-0">タイヤブランド管理</h2>
        <a href="{% url 'inventory:brand_create' %}" class="btn btn-primary shadow-sm">
            <i class="bi bi-plus-lg me-1"></i> 新規ブランド追加
        </a>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light text-muted small">
                        <tr>
                            <th class="ps-4" style="width: 200px;">ブランド名</th>
                            <th>ブランド特徴コメント</th>
                            <th class="text-end pe-4" style="width: 100px;">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for brand in brands %}
                        <tr>
                            <td class="ps-4 fw-bold text-primary">{{ brand.name }}</td>
                            <td>
                                <div class="small text-muted" style="max-height: 100px; overflow-y: auto;">
                                    {{ brand.comment|linebreaksbr|default:"(コメントなし)" }}
                                </div>
                            </td>
                            <td class="text-end pe-4">
                                <a href="{% url 'inventory:brand_edit' brand.pk %}" class="btn btn-outline-primary btn-sm rounded-pill px-3">
                                    編集
                                </a>
                            </td>
                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="3" class="text-center py-5 text-muted">
                                <i class="bi bi-tag mb-2 d-block fs-2"></i>
                                登録されているブランドはありません。
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
